name: build images

on:
  push:
    branches: [ "main" ]
    tags-ignore: [ "*" ]

permissions:
  contents: read
  packages: write

jobs:
  agma-server:
    if: "!contains(github.event.commits[0].message, 'skip:agma-server')"
    timeout-minutes: 30
    runs-on: ubuntu-latest
    name: build server image
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v4
        name: login to ghcr.io
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./agma/server
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/agma:server

  agma-vpn:
    if: "!contains(github.event.commits[0].message, 'skip:agma-vpn')"
    timeout-minutes: 5
    runs-on: ubuntu-latest
    name: build vpn image
    steps:
    - uses: actions/checkout@v6
    - uses: docker/login-action@v4
      name: login to ghcr.io
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - uses: docker/build-push-action@v6
      with:
        context: ./agma/vpn
        push: true
        tags: ghcr.io/${{ github.repository_owner }}/agma:vpn

  gp-server:
    if: "!contains(github.event.commits[0].message, 'skip:gp-server')"
    timeout-minutes: 30
    runs-on: ubuntu-latest
    name: build server image
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v4
        name: login to ghcr.io
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./gp/server
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/gp:server
